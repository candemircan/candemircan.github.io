on:
  workflow_dispatch:
  push:
    branches: main

name: Quarto Publish

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Check out cv submodule (private repo, via read-only deploy key)
        env:
          CV_SUBMODULE_KEY: ${{ secrets.CV_SUBMODULE_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$CV_SUBMODULE_KEY" > ~/.ssh/cv_submodule_deploy
          chmod 600 ~/.ssh/cv_submodule_deploy
          GIT_SSH_COMMAND="ssh -i ~/.ssh/cv_submodule_deploy -o StrictHostKeyChecking=accept-new" \
            git submodule update --init cv

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Render and Publish
        uses: quarto-dev/quarto-actions/publish@v2
        with:
          target: gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
